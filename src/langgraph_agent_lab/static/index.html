<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LangGraph Agent Lab</title>
    <style>
      :root {
        --canvas: #faf9f5;
        --soft: #f5f0e8;
        --card: #efe9de;
        --dark: #181715;
        --dark-2: #252320;
        --ink: #141413;
        --body: #3d3d3a;
        --muted: #6c6a64;
        --line: #e6dfd8;
        --coral: #cc785c;
        --coral-active: #a9583e;
        --teal: #5db8a6;
        --amber: #e8a55a;
        --error: #c64545;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--canvas);
        color: var(--ink);
        font-family:
          Inter,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      main {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0 56px;
      }

      .nav {
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--line);
        margin-bottom: 56px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 600;
      }

      .mark {
        width: 18px;
        height: 18px;
        position: relative;
      }

      .mark::before,
      .mark::after {
        content: "";
        position: absolute;
        inset: 8px 0 auto;
        height: 2px;
        background: var(--ink);
        transform-origin: center;
      }

      .mark::after {
        transform: rotate(90deg);
      }
      .mark span::before,
      .mark span::after {
        content: "";
        position: absolute;
        inset: 8px 0 auto;
        height: 2px;
        background: var(--ink);
        transform-origin: center;
      }

      .mark span::before {
        transform: rotate(45deg);
      }
      .mark span::after {
        transform: rotate(-45deg);
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 0.92fr) minmax(360px, 1.08fr);
        gap: 48px;
        align-items: center;
        margin-bottom: 64px;
      }

      h1,
      h2,
      h3 {
        margin: 0;
        font-family: "Times New Roman", Georgia, serif;
        font-weight: 400;
        letter-spacing: -0.02em;
      }

      h1 {
        font-size: clamp(44px, 7vw, 72px);
        line-height: 1.02;
        max-width: 720px;
      }

      h2 {
        font-size: 28px;
        line-height: 1.2;
      }
      h3 {
        font-size: 17px;
        line-height: 1.35;
      }

      p {
        color: var(--body);
        font-size: 16px;
        line-height: 1.62;
      }

      .lead {
        max-width: 560px;
        margin: 22px 0 0;
        font-size: 18px;
      }

      .panel {
        background: var(--card);
        border-radius: 12px;
        padding: 28px;
        border: 1px solid rgba(230, 223, 216, 0.8);
      }

      .dark-panel {
        background: var(--dark);
        color: var(--canvas);
        border-radius: 16px;
        padding: 24px;
      }

      .dark-panel p,
      .dark-panel label {
        color: #a09d96;
      }

      form {
        display: grid;
        gap: 14px;
      }

      label {
        display: block;
        color: var(--muted);
        font-size: 13px;
        font-weight: 500;
        margin-bottom: 8px;
      }

      textarea {
        width: 100%;
        min-height: 128px;
        resize: vertical;
        background: var(--canvas);
        color: var(--ink);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 13px 14px;
        font:
          15px/1.55 Inter,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        outline: none;
      }

      textarea:focus {
        border-color: var(--coral);
        box-shadow: 0 0 0 3px rgba(204, 120, 92, 0.15);
      }

      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      button {
        min-height: 40px;
        border: 1px solid transparent;
        border-radius: 8px;
        padding: 12px 20px;
        font:
          500 14px/1 Inter,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }

      .primary {
        background: var(--coral);
        color: white;
      }

      .primary:hover {
        background: var(--coral-active);
      }

      .secondary {
        background: var(--canvas);
        color: var(--ink);
        border-color: var(--line);
      }

      .danger {
        background: var(--error);
        color: white;
      }

      .chip-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 18px;
      }

      .chip {
        min-height: 0;
        border-radius: 9999px;
        padding: 7px 12px;
        background: var(--canvas);
        border: 1px solid var(--line);
        color: var(--muted);
        font-size: 13px;
      }

      .result-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 18px;
      }

      .stat {
        background: var(--soft);
        border-radius: 12px;
        padding: 16px;
        border: 1px solid var(--line);
      }

      .stat span {
        display: block;
        color: var(--muted);
        font-size: 12px;
        font-weight: 500;
        margin-bottom: 6px;
      }

      .stat strong {
        display: block;
        color: var(--ink);
        font-size: 18px;
        overflow-wrap: anywhere;
      }

      .answer {
        background: var(--canvas);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 18px;
        color: var(--body);
        line-height: 1.62;
        margin-bottom: 18px;
      }

      .approval-card {
        background: var(--coral);
        color: white;
        border-radius: 12px;
        padding: 22px;
        margin-bottom: 18px;
      }

      .approval-card p {
        color: rgba(255, 255, 255, 0.88);
        margin-bottom: 16px;
      }

      .trace {
        background: var(--dark);
        color: var(--canvas);
        border-radius: 12px;
        padding: 18px;
        overflow: hidden;
      }

      .trace h3 {
        color: var(--canvas);
        margin-bottom: 12px;
      }

      ol {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 8px;
      }

      li {
        display: grid;
        grid-template-columns: 130px 1fr auto;
        gap: 12px;
        align-items: center;
        padding: 10px 12px;
        border-radius: 8px;
        background: var(--dark-2);
        color: #a09d96;
        font-size: 13px;
      }

      code {
        color: var(--amber);
        font-family: "JetBrains Mono", "Courier New", monospace;
        font-size: 13px;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 13px;
      }

      .dot {
        width: 9px;
        height: 9px;
        border-radius: 9999px;
        background: var(--teal);
      }

      .error {
        color: var(--error);
        font-size: 14px;
      }
      .empty {
        color: var(--muted);
        padding: 12px 0;
      }
      .ok {
        color: var(--teal);
      }
      .hot {
        color: var(--coral);
      }

      @media (max-width: 900px) {
        .hero {
          grid-template-columns: 1fr;
        }
        .result-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
        li {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 560px) {
        main {
          width: min(100% - 24px, 1180px);
          padding-top: 18px;
        }
        .nav {
          margin-bottom: 36px;
        }
        .result-grid {
          grid-template-columns: 1fr;
        }
        .panel,
        .dark-panel {
          padding: 20px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <nav class="nav">
        <div class="brand">
          <span class="mark"><span></span></span> Langgraph Agent
        </div>
        <div class="status"><span class="dot"></span> LangGraph runtime</div>
      </nav>

      <section class="hero">
        <div>
          <h1>Test support agent workflow.</h1>
          <p class="lead">
            Run a query, inspect the route, and approve or reject risky actions
            before execution.
          </p>
        </div>

        <div class="panel">
          <form id="query-form">
            <div>
              <label for="query">Support request</label>
              <textarea id="query">
Refund this customer and send confirmation email</textarea
              >
            </div>
            <div class="button-row">
              <button class="primary" id="run" type="submit">
                Run Workflow
              </button>
              <span class="error" id="error" hidden></span>
            </div>
          </form>
          <div class="chip-list" id="examples"></div>
        </div>
      </section>

      <section class="dark-panel">
        <h2>Workflow output</h2>
        <p>
          Trace shows the latest workflow pass. Risky routes pause for a human
          decision.
        </p>
        <div id="result">
          <div class="empty">Run a query to inspect the workflow.</div>
        </div>
      </section>
    </main>

    <script>
      const examples = [
        "How do I reset my password?",
        "Please lookup order status for order 12345",
        "Can you fix it?",
        "Refund this customer and send confirmation email",
        "Delete customer account after support verification",
        "Timeout failure while processing request",
      ];

      const form = document.querySelector("#query-form");
      const query = document.querySelector("#query");
      const run = document.querySelector("#run");
      const error = document.querySelector("#error");
      const result = document.querySelector("#result");
      const examplesNode = document.querySelector("#examples");

      let lastQuery = query.value;

      examples.forEach((text) => {
        const chip = document.createElement("button");
        chip.type = "button";
        chip.className = "chip";
        chip.textContent = text;
        chip.addEventListener("click", () => {
          query.value = text;
        });
        examplesNode.appendChild(chip);
      });

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      async function postJson(url, payload) {
        const response = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || "Request failed");
        return data;
      }

      function traceHtml(events) {
        return events
          .map(
            (event, index) => `
        <li>
          <code>${String(index + 1).padStart(2, "0")} · ${escapeHtml(event.node)}</code>
          <span>${escapeHtml(event.message)}</span>
          <span>${escapeHtml(event.event_type)}</span>
        </li>
      `,
          )
          .join("");
      }

      function approvalHtml(data) {
        if (!data.pending_approval) return "";
        return `
        <div class="approval-card">
          <h3>Approval required</h3>
          <p>${escapeHtml(data.proposed_action)}</p>
          <div class="button-row">
            <button class="secondary" data-decision="approve">Approve</button>
            <button class="danger" data-decision="reject">Reject</button>
          </div>
        </div>
      `;
      }

      function render(data) {
        const routeClass =
          data.route === "risky" || data.route === "error" ? "hot" : "ok";
        result.innerHTML = `
        <div class="result-grid">
          <div class="stat"><span>Route</span><strong class="${routeClass}">
            ${escapeHtml(data.route)}
          </strong></div>
          <div class="stat"><span>Risk</span><strong>${escapeHtml(data.risk_level)}</strong></div>
          <div class="stat"><span>Attempts</span><strong>
            ${escapeHtml(data.attempt ?? 0)}
          </strong></div>
          <div class="stat"><span>Status</span><strong>
            ${data.pending_approval ? "Needs approval" : "Complete"}
          </strong></div>
        </div>
        ${approvalHtml(data)}
        <div class="answer">
          ${escapeHtml(data.final_answer || data.pending_question || data.message)}
        </div>
        <div class="trace">
          <h3>Node trace</h3>
          <ol>${traceHtml(data.events || [])}</ol>
        </div>
      `;

        result.querySelectorAll("[data-decision]").forEach((button) => {
          button.addEventListener("click", async () => {
            const approved = button.dataset.decision === "approve";
            await decide(approved);
          });
        });
      }

      async function decide(approved) {
        error.hidden = true;
        result.querySelectorAll("button").forEach((button) => {
          button.disabled = true;
        });
        try {
          const data = await postJson("/api/decision", {
            query: lastQuery,
            approved,
          });
          render(data);
        } catch (err) {
          error.textContent = err.message;
          error.hidden = false;
        }
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        error.hidden = true;
        run.disabled = true;
        run.textContent = "Running...";
        lastQuery = query.value;

        try {
          render(await postJson("/api/run", { query: lastQuery }));
        } catch (err) {
          error.textContent = err.message;
          error.hidden = false;
        } finally {
          run.disabled = false;
          run.textContent = "Run Workflow";
        }
      });
    </script>
  </body>
</html>
